<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Builder with Dynamic Sections</title>
</head>
<body>
    <h2>FAQ Manager</h2>
    <div id="container">
        <h3>Question</h3><input type="text" id="question" placeholder="Enter a question" required> <br> <br>
        <p>Answer <input type="text" id="answer" placeholder="Enter an Answer" required></p> <br> <br>
        <p id="ans"></p>
    </div>
    <button id="addBtn">Add FAQ</button>
    <button id="deleteBtn">Delete FAQ</button>
    <script src="./assign2.js"></script>
</body>
</html>
