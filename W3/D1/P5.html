<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Objects, arrays</title>
    <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
</head>
<body>
    <pre id="out">
    </pre>
    <button id="runBtn" class="px-3 py-1 rounded mt-2 mb-2 bg-black text-white">
        Run
    </button>
    <script>
        const out = document.getElementById("out");
         function print(...args){
            //Console
            console.log(...args);
            out.textContent+=args.join("")+"\n";
        }
       
        function clearOut(){
            out.textContent= "";
        }
        function run(){
            clearOut();
           
            const user = {name:"Mahesh",age:23};
            print("User = ", JSON.stringify(user));

            const MyArray = [1,2,3];
            MyArray.push(5);
            print("Is it an array:?", Array.isArray(MyArray));
        }
        document.getElementById("runBtn").addEventListener("click",run);
    </script>
</body>
</html>
